name: Java CI with Maven

# 触发条件：push 或 pull request 到 main 分支
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # 运行环境：Ubuntu 最新版
    runs-on: ubuntu-latest

    # 连接 Docker 内的 MySQL（GitHub Actions 支持服务容器）
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: user_api_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 第1步：拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 第2步：安装 JDK 23
      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven

      # 第3步：运行测试 + 生成覆盖率报告
      - name: Test with Maven
        run: mvn clean test jacoco:report
        working-directory: user-api-java
        env:
          # 用 GitHub Actions 里的 MySQL（地址是 localhost，不是容器名）
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/user_api_test?useSSL=false&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: admin
          SPRING_JPA_HIBERNATE_DDL_AUTO: update
          JWT_SECRET: ci-secret-key-for-testing-only

      # 第4步：上传 JaCoCo 报告
      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: user-api-java/target/site/jacoco/