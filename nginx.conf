server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Vue SPA 路由：所有非静态资源请求返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理到后端
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 上传文件代理到后端
    location /uploads/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
}